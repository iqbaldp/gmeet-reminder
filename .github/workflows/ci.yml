name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  package:
    name: Package DMG
    runs-on: macos-14
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Generate icon
        run: ./scripts/generate-icon.sh

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Check release artifact
        run: ./scripts/check-release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meeting-reminder-dmg
          path: |
            dist/MeetingReminder-*.dmg
            dist/SHA256SUMS.txt

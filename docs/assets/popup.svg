<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1120" cy="260" r="280" fill="#14B8A6" opacity="0.16"/>
  <circle cx="430" cy="720" r="320" fill="#F97316" opacity="0.12"/>
  <text x="160" y="182" font-family="Avenir Next, Helvetica, sans-serif" font-size="62" font-weight="800" fill="#F8FAFC">A popup that actually interrupts.</text>
  <text x="160" y="236" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" fill="#BAE6FD">Configurable timing, meeting link detection, and one-click join.</text>
  <g filter="url(#shadow)" transform="translate(540 300)">
    <rect width="520" height="286" rx="22" fill="#FFFFFF"/>
    <rect x="0" y="0" width="520" height="52" rx="22" fill="#F8FAFC"/>
    <circle cx="28" cy="26" r="7" fill="#F87171"/>
    <circle cx="52" cy="26" r="7" fill="#FBBF24"/>
    <circle cx="76" cy="26" r="7" fill="#34D399"/>
    <text x="32" y="96" font-family="Avenir Next, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#64748B">Meeting starts in 1 minute</text>
    <text x="32" y="146" font-family="Avenir Next, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#0F172A">Design Review</text>
    <text x="32" y="184" font-family="Avenir Next, Helvetica, sans-serif" font-size="22" fill="#64748B">7:30 PM - 8:00 PM</text>
    <rect x="32" y="216" width="136" height="46" rx="12" fill="#E2E8F0"/>
    <text x="64" y="246" font-family="Avenir Next, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#334155">Dismiss</text>
    <rect x="314" y="216" width="174" height="46" rx="12" fill="#0F766E"/>
    <text x="342" y="246" font-family="Avenir Next, Helvetica, sans-serif" font-size="19" font-weight="800" fill="#FFFFFF">Open Meeting</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1600" y2="900">
      <stop offset="0" stop-color="#083344"/>
      <stop offset="0.45" stop-color="#134E4A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1600" y2="68">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="32" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#wallpaper)"/>
  <circle cx="1260" cy="600" r="360" fill="#14B8A6" opacity="0.12"/>
  <circle cx="290" cy="730" r="300" fill="#F97316" opacity="0.12"/>
  <rect x="0" y="0" width="1600" height="68" fill="url(#bar)"/>
  <text x="32" y="43" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0F172A">Meeting Reminder</text>
  <text x="1220" y="43" font-family="Avenir Next, Helvetica, sans-serif" font-size="26" fill="#0F172A">Sat 16 May 19:24</text>
  <g transform="translate(650 12)">
    <rect width="380" height="44" rx="14" fill="#0F172A" opacity="0.92"/>
    <circle cx="26" cy="22" r="12" fill="#14B8A6"/>
    <text x="50" y="29" font-family="Avenir Next, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#F8FAFC">Design Review in 5m</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="250" y="220" width="1100" height="420" rx="36" fill="#F8FAFC" opacity="0.94"/>
    <text x="310" y="310" font-family="Avenir Next, Helvetica, sans-serif" font-size="54" font-weight="800" fill="#0F172A">Meetings stay visible.</text>
    <text x="310" y="370" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" fill="#475569">A small menu bar reminder that reads your local macOS Calendar.</text>
    <rect x="310" y="440" width="430" height="90" rx="24" fill="#0F172A"/>
    <text x="346" y="495" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">Next: Design Review</text>
    <rect x="770" y="440" width="260" height="90" rx="24" fill="#CCFBF1"/>
    <text x="826" y="495" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#115E59">in 5m</text>
    <rect x="1060" y="440" width="180" height="90" rx="24" fill="#FED7AA"/>
    <text x="1100" y="495" font-family="Avenir Next, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#9A3412">Popup</text>
  </g>
</svg>
